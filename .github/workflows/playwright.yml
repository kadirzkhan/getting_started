name: Playwright Tests

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install Playwright browsers
        run: |
          python -m playwright install --with-deps

      - name: Create folders
        run: |
          mkdir -p Reports
          mkdir -p auth

      - name: Generate auth state
        run: |
          pytest tests/test_auth_setup.py -v --env=qa --browser chromium

      - name: Run tests and generate HTML report
        run: |
          pytest tests/test_login.py tests/test_login_data.py tests/test_inventory.py tests/test_cart.py tests/test_checkout.py -v --env=qa --browser chromium --html=Reports/pwreport.html --self-contained-html --tracing=retain-on-failure --screenshot=only-on-failure

      - name: Upload HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: html-test-report
          path: Reports/pwreport.html

      - name: Upload Playwright test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-test-results
          path: test-results/

      - name: Upload auth state for debugging
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: auth-state-debug
          path: auth/
